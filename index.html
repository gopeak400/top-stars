<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل النجوم والطوالع</title>
    <style>
        /* تعريف الخط الذي رفعته في مجلد fonts */
        @font-face {
            font-family: 'GeezaPro';
            src: url('fonts/GeezaPro.ttf') format('truetype');
        }

        body {
            font-family: 'GeezaPro', Tahoma, sans-serif;
            background-color: #0f172a; /* لون ليلي غامق */
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 10px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #38bdf8;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .star-card {
            background: #1e293b;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            border-right: 6px solid #38bdf8;
            transition: transform 0.2s;
        }

        .star-card:active {
            transform: scale(0.98);
        }

        .star-card img {
            width: 80px;
            height: 80px;
            margin-left: 20px;
            border-radius: 12px;
            background: #334155;
            padding: 5px;
        }

        .star-info h2 {
            margin: 0;
            color: #38bdf8;
            font-size: 1.3rem;
        }

        .star-info p {
            margin: 8px 0 0;
            color: #94a3b8;
            line-height: 1.5;
            font-size: 1rem;
        }

        .season-tag {
            display: inline-block;
            background: #0ea5e9;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>دليل النجوم والطوالع</h1>
    </div>

    <div id="stars-list">
        <div class="star-card">
            <img src="images/icon_star_1.png" alt="star">
            <div class="star-info">
                <span class="season-tag">فصل الربيع</span>
                <h2>الشرطين</h2>
                <p>أول طوالع الربيع، وفيه يتساوى الليل والنهار ويزين الجو.</p>
            </div>
        </div>

        <div class="star-card">
            <img src="images/icon_star_2.png" alt="star">
            <div class="star-info">
                <span class="season-tag">فصل الربيع</span>
                <h2>البطين</h2>
                <p>ثاني طوالع الربيع، يزداد فيه الدفء وتنمو فيه النباتات.</p>
            </div>
        </div>
        
        </div>
</div>

</body>
</html>
